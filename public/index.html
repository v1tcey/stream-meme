<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #canvas { width: 400px; height: 225px; background: #333; border: 2px solid #555; position: relative; cursor: crosshair; }
        #marker { width: 20px; height: 20px; background: red; position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); }
        .controls { display: flex; flex-direction: column; gap: 10px; width: 400px; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Выберите место на экране (1920x1080)</h3>
    <div id="canvas" onclick="setPos(event)">
        <div id="marker" style="top:50%; left:50%"></div>
    </div>
    <div class="controls">
        <input type="password" id="pass" placeholder="Пароль">
        <input type="file" id="imgFile" accept="image/*">
        <input type="file" id="audioFile" accept="audio/*">
        <input type="text" id="text" placeholder="Текст (необязательно)">
        <button onclick="send()">Отправить на стрим</button>
        <p id="status"></p>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let pos = {x: 50, y: 50};
        function setPos(e) {
            const rect = e.target.getBoundingClientRect();
            pos.x = (e.clientX - rect.left) / rect.width * 100;
            pos.y = (e.clientY - rect.top) / rect.height * 100;
            document.getElementById('marker').style.left = pos.x + '%';
            document.getElementById('marker').style.top = pos.y + '%';
        }
        function send() {
            const img = document.getElementById('imgFile').files[0];
            const aud = document.getElementById('audioFile').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(img);
            reader.onload = (e) => {
                const data = { pass: document.getElementById('pass').value, img: e.target.result, text: document.getElementById('text').value, x: pos.x, y: pos.y };
                if (aud) {
                    const readerAud = new FileReader();
                    readerAud.readAsDataURL(aud);
                    readerAud.onload = (ae) => { data.audio = ae.target.result; socket.emit('meme', data); }
                } else { socket.emit('meme', data); }
                document.getElementById('status').innerText = "✅ Отправлено!";
            }
        }
        const socket = io();
    </script>
</body>
</html>
