<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; height: 100vh; width: 100vw; background: transparent; }
        .meme-box { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; transition: all 0.3s; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0) translate(-50%, -50%); opacity: 0; } 100% { transform: scale(1) translate(-50%, -50%); opacity: 1; } }
        img { max-width: 500px; max-height: 500px; border-radius: 15px; }
        .text { color: white; font-size: 32px; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-top: 15px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="cont"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('show', (d) => {
            const cont = document.getElementById('cont');
            cont.innerHTML = `<div class="meme-box" style="left:${d.x}%; top:${d.y}%;">
                                <img src="${d.img}">
                                ${d.text ? `<div class="text">${d.text}</div>` : ''}
                              </div>`;
            setTimeout(() => cont.innerHTML = '', 8000);
        });
    </script>
</body>
</html>
