<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; height: 100vh; width: 100vw; background: transparent; }
        .meme-box { position: absolute; transition: all 0.5s ease; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        img { max-width: 500px; display: block; }
        .text { color: white; font-size: 30px; font-weight: bold; text-shadow: 2px 2px 4px black; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="cont"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('show', (d) => {
            const cont = document.getElementById('cont');
            cont.innerHTML = `<div class="meme-box" style="left:${d.x}%; top:${d.y}%; transform:translate(-50%, -50%)">
                                <img src="${d.img}">
                                <div class="text">${d.text || ''}</div>
                              </div>`;
            if (d.audio) { const a = new Audio(d.audio); a.play(); }
            setTimeout(() => cont.innerHTML = '', 7000);
        });
    </script>
</body>
</html>
