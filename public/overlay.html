<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; height: 100vh; width: 100vw; background: transparent; }
        .meme-box { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; animation: popIn 0.5s; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5) translate(-100%, -100%); } 100% { opacity: 1; transform: scale(1) translate(-50%, -50%); } }
    </style>
</head>
<body>
    <div id="cont"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('show', (d) => {
            const cont = document.getElementById('cont');
            cont.innerHTML = `<div class="meme-box" style="left:${d.x}%; top:${d.y}%;">
                                <img src="${d.img}" style="max-width:${d.size}px; border-radius:10px;">
                                <div style="color:white; font-size:24px; font-weight:bold; margin-top:10px; text-shadow:0 2px 5px black;">${d.text}</div>
                              </div>`;
            setTimeout(() => cont.innerHTML = '', 8000);
        });
    </script>
</body>
</html>
